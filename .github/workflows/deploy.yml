name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to KodeClouds Server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: "index.html,about.html,approach.html,contact.html,few-words.html,for-clients.html,style.css,images/*"
          target: "/home/kodeclouds-tylerboudreau/htdocs/tylerboudreau.kodeclouds.com/"
          strip_components: 0
          overwrite: true

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            PROJECT_PATH="/home/kodeclouds-tylerboudreau/htdocs/tylerboudreau.kodeclouds.com"
            if [ -f "$PROJECT_PATH/index.html" ]; then
              echo "✓ index.html found"
              echo "✓ Files: $(ls -1 $PROJECT_PATH | wc -l) items"
              echo "✓ Deployed at: $(date)"
            else
              echo "✗ index.html NOT found — deployment may have failed"
              exit 1
            fi
